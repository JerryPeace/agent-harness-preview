<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Agent × Harness — Canvas 逐幀預覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#F4F1E8; --ink:#1B1B1F; --accent:#EE4D2E; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:#222; color:#eee; font-family:"Noto Sans TC",system-ui,sans-serif;}
  body{display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px;}
  h1{font-size:16px; font-weight:700; letter-spacing:2px; color:#ddd;}
  h1 span{color:var(--accent);}
  #stage{position:relative; width:min(96vw, 1280px); aspect-ratio:16/9; background:#000; border-radius:10px; overflow:hidden; box-shadow:0 14px 50px rgba(0,0,0,.5);}
  canvas{width:100%; height:100%; display:block;}
  #scenelabel{position:absolute; top:12px; left:14px; font-size:13px; background:rgba(0,0,0,.55); padding:6px 12px; border-radius:20px; letter-spacing:1px;}
  .controls{display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; width:min(96vw,1280px);}
  button{font-family:inherit; font-size:14px; font-weight:700; color:#1B1B1F; background:#F4F1E8; border:none; padding:9px 16px; border-radius:8px; cursor:pointer; transition:transform .15s, background .15s;}
  button:hover{transform:translateY(-2px); background:#fff;}
  button.accent{background:var(--accent); color:#fff;}
  #scrub{flex:1; min-width:200px; accent-color:var(--accent); cursor:pointer;}
  #time{font-variant-numeric:tabular-nums; font-size:13px; min-width:96px; text-align:center; color:#bbb;}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; width:min(96vw,1280px);}
  .tab{font-size:12px; font-weight:500; padding:5px 10px; border-radius:6px; background:#333; color:#bbb; cursor:pointer; transition:.15s;}
  .tab:hover{background:#444; color:#fff;}
  .tab.active{background:var(--accent); color:#fff;}
  .hint{font-size:12px; color:#888;}
</style>
</head>
<body>
  <h1>AI Agent × <span>Harness</span> ─ Canvas 逐幀預覽 · 統一正黑體 · Duotone</h1>
  <div id="stage">
    <canvas id="cv" width="1920" height="1080"></canvas>
    <div id="scenelabel"></div>
  </div>
  <div class="controls">
    <button id="prev">◀ 上一頁</button>
    <button id="play" class="accent">▶ 播放</button>
    <button id="next">下一頁 ▶</button>
    <input id="scrub" type="range" min="0" max="100" value="0" />
    <span id="time">00 / 00f</span>
    <label class="hint"><input type="checkbox" id="loop" checked /> 單頁循環</label>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="hint">← → 切換頁面 · 空白鍵播放/暫停</div>

<script>
const C = { paper:'#F4F1E8', paperHi:'#FBF9F2', ink:'#1B1B1F', inkSoft:'#5A5A60', accent:'#EE4D2E', line:'rgba(27,27,31,0.10)' };
const FONT = 'Noto Sans TC';
const W=1920, H=1080, FPS=30;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ---------- 動畫工具 ----------
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const easeOut=x=>1-Math.pow(1-x,3);
const easeInOut=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
const ap=(f,delay=0,dur=16)=>easeOut(clamp((f-delay)/dur,0,1)); // appear 0..1

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function setFont(size,weight=700){ctx.font=`${weight} ${size}px "${FONT}"`;}

// ---------- 基礎元件 ----------
function bg(){
  ctx.fillStyle=C.paper; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=C.line;
  for(let x=0;x<W;x+=64)for(let y=0;y<H;y+=64){ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fill();}
  // 暗角
  const g=ctx.createRadialGradient(W/2,H/2,400,W/2,H/2,1100);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(27,27,31,0.06)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function box(x,y,w,h,o={}){
  const p=o.p??1; if(p<=0.001)return;
  ctx.save(); ctx.globalAlpha=clamp(p,0,1);
  ctx.translate(0,(1-easeOut(p))*26);
  ctx.fillStyle=o.shadow??C.ink; rr(x+8,y+8,w,h,8); ctx.fill();
  ctx.fillStyle=o.fill??C.paperHi; rr(x,y,w,h,8); ctx.fill();
  ctx.lineWidth=3.5; ctx.strokeStyle=C.ink; rr(x,y,w,h,8); ctx.stroke();
  if(o.label){ctx.fillStyle=o.color??C.ink; setFont(o.size??34,o.weight??700);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    wrapText(o.label, x+w/2, y+h/2, w-30, (o.size??34)*1.25);}
  ctx.restore();
}
function wrapText(text,cx,cy,maxW,lh){
  const lines=[]; let line='';
  for(const ch of text){ if(ctx.measureText(line+ch).width>maxW && line){lines.push(line);line=ch;} else line+=ch; }
  if(line)lines.push(line);
  const start=cy-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,cx,start+i*lh));
}
function arrow(x1,y1,x2,y2,p=1,color=C.accent){
  if(p<=0)return; const cx=x1+(x2-x1)*easeOut(p), cy=y1+(y2-y1)*easeOut(p);
  ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=4.5; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(cx,cy);ctx.stroke();
  if(p>.95){const a=Math.atan2(y2-y1,x2-x1);ctx.translate(x2,y2);ctx.rotate(a);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-20,-10);ctx.lineTo(-20,10);ctx.closePath();ctx.fill();}
  ctx.restore();
}
function caption(text,p=1){
  if(p<=0)return; ctx.save(); ctx.globalAlpha=clamp(p,0,1);
  setFont(36,500); const tw=ctx.measureText(text).width;
  const pad=42, bw=tw+pad*2+30, bx=W/2-bw/2, by=H-150;
  ctx.translate(0,(1-easeOut(p))*20);
  ctx.fillStyle=C.accent; rr(bx+6,by+6,bw,76,6); ctx.fill();
  ctx.fillStyle=C.ink; rr(bx,by,bw,76,6); ctx.fill();
  ctx.fillStyle=C.accent; ctx.beginPath();ctx.arc(bx+30,by+38,7,0,7);ctx.fill();
  ctx.fillStyle=C.paperHi; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(text, bx+52, by+40);
  ctx.restore();
}
function capTrack(f, items){ let cur=items[0]; for(const it of items)if(f>=it.from)cur=it;
  caption(cur.text, ap(f-cur.from,0,10)); }
function sectionTag(num,title,sub,f){
  const p=ap(f,2,18), p2=ap(f,9,18);
  ctx.save(); ctx.globalAlpha=p; ctx.translate((1-easeOut(p))*-24,0);
  ctx.fillStyle=C.accent; setFont(118,900); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(num,120,210);
  ctx.restore();
  ctx.save(); ctx.globalAlpha=p2;
  ctx.fillStyle=C.ink; ctx.fillRect(280,120,64,9);
  setFont(62,900); ctx.fillStyle=C.ink; ctx.textAlign='left'; ctx.fillText(title,280,205);
  if(sub){setFont(24,500); ctx.fillStyle=C.inkSoft; ctx.fillText(sub,282,250);}
  ctx.restore();
}
function centerText(text,y,size,weight,color,p=1,ls=0){
  ctx.save(); ctx.globalAlpha=clamp(p,0,1); ctx.translate(0,(1-easeOut(p))*30);
  setFont(size,weight); ctx.fillStyle=color; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(ls){ // letter spacing manual
    const chars=[...text]; let tot=0; chars.forEach(c=>tot+=ctx.measureText(c).width+ls); tot-=ls;
    let x=W/2-tot/2; chars.forEach(c=>{const w=ctx.measureText(c).width;ctx.fillText(c,x+w/2,y);x+=w+ls;});
  } else ctx.fillText(text,W/2,y);
  ctx.restore();
}
function pulse(x,y,r,f,color=C.accent){const t=(f%50)/50;ctx.save();ctx.globalAlpha=1-t;ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,r+t*38,0,7);ctx.stroke();ctx.restore();}

// ---------- 場景 ----------
const SCENES=[];
const S=(name,sec,draw)=>SCENES.push({name,dur:Math.round(sec*FPS),draw});

S('開場',16,(f)=>{ bg();
  centerText('一支動畫 · 徹底搞懂',360,30,500,C.accent,ap(f,6),12);
  centerText('AI Agent 怎麼運作',490,150,900,C.ink,ap(f,16),6);
  const w=ap(f,30,24)*560; ctx.fillStyle=C.accent; ctx.fillRect(W/2-w/2,560,w,12);
  centerText('以及，Harness 又是什麼？',680,66,700,C.accent,ap(f,40),2);
});
S('壹·痛點',30,(f)=>{ bg(); sectionTag('壹','一切的起點','THE PROBLEM',f);
  box(810,360,300,140,{p:ap(f,8),fill:C.ink,color:C.paperHi,label:'ChatGPT',size:44});
  const sh=(f>60&&f<130)?Math.sin(f/3)*0.04:0;
  ctx.save(); ctx.translate(W/2,640); ctx.rotate(sh);
  box(-360,0,720,120,{p:ap(f,30),label:'它畫的蘋果 logo 實在太醜了',size:42,fill:C.paperHi});
  ctx.restore();
  capTrack(f,[{from:0,text:'叫 AI 用程式畫一個極簡的蘋果 logo'},{from:120,text:'結果歪七扭八 ── 這就是 2026 年 AI 的水平？'},{from:240,text:'其實，只要餵給它對的素材就行'}]);
});
S('壹·自動化',36,(f)=>{ bg(); sectionTag('壹','把它自動化','THE WRAPPER',f);
  box(180,430,300,120,{p:ap(f,10),label:'使用者提示詞',size:32});
  box(810,420,300,140,{p:ap(f,24),fill:C.accent,color:'#fff',label:'套殼網站',size:40});
  box(1440,430,300,120,{p:ap(f,40),label:'素材搜尋函式',size:32});
  arrow(490,490,800,490,ap(f-20,0,16));
  arrow(1120,490,1430,490,ap(f-36,0,16));
  capTrack(f,[{from:0,text:'與其每次手動找素材，不如自動化'},{from:110,text:'用 API 把 ChatGPT 包成一個網站'},{from:220,text:'後台再寫一個「自動搜尋圖示」的函式'},{from:330,text:'使用者一句話，網站就分好幾步完成'}]);
});
S('貳·工具調用',42,(f)=>{ bg(); sectionTag('貳','工具調用','TOOL CALLING',f);
  box(840,300,240,120,{p:ap(f,6),fill:C.ink,color:'#fff',label:'AI',size:46});
  box(300,560,360,110,{p:ap(f,24),label:'① 我需要素材',size:32});
  box(780,560,360,110,{p:ap(f,40),fill:C.accent,color:'#fff',label:'② 呼叫搜尋工具',size:32});
  box(1260,560,360,110,{p:ap(f,56),label:'③ 拿到 SVG',size:32});
  arrow(960,420,480,560,ap(f-20,0,16)); arrow(960,420,960,560,ap(f-36,0,16)); arrow(960,420,1440,560,ap(f-52,0,16));
  capTrack(f,[{from:0,text:'網站告訴 AI：這是需求，你有一個搜尋工具可用'},{from:130,text:'AI 分析後發現：需要蘋果 logo 素材'},{from:260,text:'於是回覆網站，請求呼叫搜尋工具'},{from:380,text:'後台執行、拿回 SVG，再交給 AI 完成創作'}]);
});
S('貳·自我檢查',28,(f)=>{ bg(); sectionTag('貳','自我檢查','VISION CHECK',f);
  box(300,440,340,120,{p:ap(f,8),label:'AI 繪製 SVG',size:34});
  box(790,440,340,120,{p:ap(f,24),fill:C.accent,color:'#fff',label:'渲染成圖片',size:34});
  box(1280,440,340,120,{p:ap(f,40),label:'檢查對不對',size:34});
  arrow(640,500,780,500,ap(f-22,0,14)); arrow(1130,500,1270,500,ap(f-38,0,14));
  arrow(1450,580,470,580,ap(f-56,0,20));
  capTrack(f,[{from:0,text:'有時 AI 還是會翻車，畫得亂七八糟'},{from:120,text:'那就再給它一個「視覺檢查」工具'},{from:240,text:'畫完自己渲染、自己檢查，不對就重畫'}]);
});
S('貳·ReAct 循環',56,(f)=>{ bg(); sectionTag('貳','ReAct 循環','REASON · ACT · OBSERVE',f);
  const cx=960,cy=580,r=230; pulse(cx,cy,r,f);
  ctx.save();ctx.strokeStyle=C.inkSoft;ctx.lineWidth=3;ctx.setLineDash([10,12]);ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();ctx.restore();
  const orbit=(f/40)%(7);ctx.fillStyle=C.accent;ctx.beginPath();ctx.arc(cx+r*Math.cos(orbit),cy+r*Math.sin(orbit),14,0,7);ctx.fill();
  const pts=[[-90,'思考'],[30,'行動'],[150,'觀察']];
  pts.forEach((p,i)=>{const rad=p[0]*Math.PI/180;box(cx+r*Math.cos(rad)-130,cy+r*Math.sin(rad)-60,260,120,{p:ap(f,10+i*12),fill:i===0?C.ink:C.paperHi,color:i===0?'#fff':C.ink,label:p[1],size:44});});
  capTrack(f,[{from:0,text:'退一步看，AI 的工作可以拆成三步'},{from:110,text:'思考：需要什麼？該調哪個工具'},{from:230,text:'行動：請後台呼叫工具，給定參數'},{from:360,text:'觀察：拿到結果，再判斷下一步'},{from:500,text:'不斷循環 ── 這就叫 ReAct（推理＋行動）'},{from:640,text:'Claude Code、Codex 的核心，都是這套路'}]);
});
S('貳·先規劃',30,(f)=>{ bg(); sectionTag('貳','另一種模式','PLAN & EXECUTE',f);
  centerText('',0,1,400,C.ink,0); // noop
  ctx.save();ctx.globalAlpha=ap(f,10);setFont(38,700);ctx.fillStyle=C.inkSoft;ctx.textAlign='left';ctx.fillText('ReAct · 走一步看一步',230,400);ctx.restore();
  ['思考','行動','觀察','…'].forEach((t,i)=>box(230,430+i*70,240,56,{p:ap(f,16+i*6),size:28,label:t}));
  ctx.save();ctx.globalAlpha=ap(f,30);setFont(38,700);ctx.fillStyle=C.accent;ctx.textAlign='left';ctx.fillText('Plan & Execute · 先規劃',1100,400);ctx.restore();
  ['① 列出工作清單','② 依清單執行','③ 逐項完成'].forEach((t,i)=>box(1100,430+i*70,440,56,{p:ap(f,36+i*6),size:28,label:t}));
  capTrack(f,[{from:0,text:'除了 ReAct，還有「先規劃再執行」'},{from:130,text:'任務開始前，先列一張工作清單'},{from:250,text:'實際的 Agent，往往兩者結合使用'}]);
});
S('參·無記憶',38,(f)=>{ bg(); sectionTag('參','AI 沒有記憶','STATELESS',f);
  centerText('每次對話，都要把歷史重發一遍',420,50,700,C.ink,ap(f,6));
  const n=Math.min(5,Math.floor(f/45));
  for(let i=0;i<n;i++){const x=W/2-260+i*120;box(x,500,90,60+i*24,{p:1,fill:i===n-1?C.accent:C.paperHi,color:'#fff'});}
  centerText('像醫生看診，每次都要從頭翻病歷',760,32,500,C.inkSoft,ap(f,30));
  capTrack(f,[{from:0,text:'有個細節：每次對話都把之前的訊息重發'},{from:120,text:'因為大模型本身沒有記憶'},{from:240,text:'每次對話，對 AI 來說都是全新的'},{from:360,text:'訊息越疊越長 ── 問題就來了'}]);
});
S('參·上下文工作台',42,(f)=>{ bg(); sectionTag('參','上下文窗口','THE WORKBENCH',f);
  const bx=560,by=320,bw=800,bh=520; box(bx,by,bw,bh,{p:ap(f,8),fill:C.paperHi,label:''});
  const layers=['系統提示詞','使用者需求','AI 的思考','工具回傳結果','工具回傳結果','AI 的思考'];
  layers.forEach((l,i)=>{const p=ap(f,20+i*14);if(p<=0)return;ctx.save();ctx.globalAlpha=p;ctx.fillStyle=i%2?C.paper:'#EFEAD C';ctx.fillStyle=i%2?'#E9E2CF':'#F4EFE0';rr(bx+18,by+18+i*78,bw-36,64,4);ctx.fill();ctx.fillStyle=C.accent;ctx.fillRect(bx+18,by+18+i*78,8,64);ctx.fillStyle=C.ink;setFont(30,500);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(l,bx+44,by+18+i*78+32);ctx.restore();});
  const fill=clamp((f-30)/270,0.1,0.96); const barX=1420,barY=320,barH=520;
  ctx.fillStyle=C.paperHi;ctx.fillRect(barX,barY,40,barH);ctx.lineWidth=3;ctx.strokeStyle=C.ink;ctx.strokeRect(barX,barY,40,barH);
  ctx.fillStyle=fill>0.85?C.accent:C.ink;ctx.fillRect(barX,barY+barH*(1-fill),40,barH*fill);
  ctx.fillStyle=fill>0.85?C.accent:C.ink;setFont(40,900);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(Math.round(fill*100)+'%',barX+56,barY+20);
  capTrack(f,[{from:0,text:'上下文窗口，相當於 AI 的工作台'},{from:120,text:'提示詞、工具結果、AI 的思考，全擺上去'},{from:240,text:'但工作台大小有限，對話卻越來越長'},{from:340,text:'快滿了 ── 怎麼辦？'}]);
});
S('參·上下文壓縮',34,(f)=>{ bg(); sectionTag('參','上下文壓縮','COMPACTION',f);
  box(240,460,420,140,{p:ap(f,8),label:'冗長的對話歷史',size:34});
  arrow(680,530,900,530,ap(f-24,0,14));
  box(920,470,300,120,{p:ap(f,30),fill:C.accent,color:'#fff',label:'壓縮成摘要'});
  arrow(1240,530,1460,530,ap(f-46,0,14));
  box(1480,470,260,120,{p:ap(f,52),label:'騰出空間'});
  centerText('代價：壓縮必然丟失資訊 ── 交代過的事，後面又忘了',720,32,500,C.accent,ap(f,70));
  capTrack(f,[{from:0,text:'最簡單的辦法：把舊對話壓縮一下'},{from:120,text:'AI 把前面內容總結成一段摘要'},{from:230,text:'Claude Code、Codex 工作久了會觸發壓縮'},{from:340,text:'但代價是 ── 壓縮必然會丟失資訊'}]);
});
S('參·多智能體',46,(f)=>{ bg(); sectionTag('參','多智能體協作','MULTI-AGENT',f);
  box(810,300,300,130,{p:ap(f,8),fill:C.accent,color:'#fff',label:'專案經理 AI',size:40});
  ['搜尋 logo','查歷史資料','取地圖數據','生成時間線'].forEach((t,i)=>{const x=220+i*380;box(x,620,300,120,{p:ap(f,26+i*10),label:t,size:32});arrow(960,430,x+150,620,ap(f-(22+i*10),0,16),C.ink);});
  centerText('每個子 AI 有獨立的上下文窗口，互不干擾',810,28,500,C.inkSoft,ap(f,80));
  capTrack(f,[{from:0,text:'複雜任務，別讓一個 AI 從頭幹到尾'},{from:120,text:'像團隊協作：一個 AI 當專案經理'},{from:240,text:'拆分任務，分配給幾個幹活的子 AI'},{from:360,text:'各自獨立，也緩解了上下文爆炸'}]);
});
S('參·四大核心',24,(f)=>{ bg();
  centerText('到這裡，你已掌握 Agent 的四大核心',300,52,700,C.inkSoft,ap(f,6));
  ['工具調用','ReAct 循環','記憶與上下文','多智能體'].forEach((t,i)=>{const x=200+i*390;box(x,470,320,150,{p:ap(f,16+i*10),fill:i%2?C.ink:C.accent,color:'#fff',label:t,size:36});});
  centerText('但真正跑起來，全是意想不到的坑…',760,34,700,C.ink,ap(f,60));
});
// 坑版型
function pitfall(f,num,title,problem,fix,caps){ bg(); sectionTag(num,title,'THE HARNESS',f);
  ctx.save();ctx.globalAlpha=ap(f,10);setFont(32,700);ctx.fillStyle=C.accent;ctx.textAlign='left';ctx.fillText('⚠ 坑',200,400);ctx.restore();

}

// ---------- 播放控制 ----------
let cur=0, frame=0, playing=false, last=0;
const tabs=document.getElementById('tabs');
SCENES.forEach((s,i)=>{const d=document.createElement('div');d.className='tab';d.textContent=(i+1)+'·'+s.name;d.onclick=()=>{cur=i;frame=0;render();updateUI();};tabs.appendChild(d);});
const scrub=document.getElementById('scrub'),timeEl=document.getElementById('time'),label=document.getElementById('scenelabel');
function updateUI(){const s=SCENES[cur];scrub.max=s.dur-1;scrub.value=frame;timeEl.textContent=String(frame).padStart(3,'0')+' / '+s.dur+'f';label.textContent=(cur+1)+'/'+SCENES.length+'  '+s.name;[...tabs.children].forEach((t,i)=>t.classList.toggle('active',i===cur));}
function render(){const s=SCENES[cur];ctx.clearRect(0,0,W,H);s.draw(frame);updateUI();}
function loop(ts){if(playing){if(!last)last=ts;const dt=ts-last;if(dt>=1000/FPS){frame++;last=ts;const s=SCENES[cur];if(frame>=s.dur){if(document.getElementById('loop').checked)frame=0;else if(cur<SCENES.length-1){cur++;frame=0;}else{playing=false;document.getElementById('play').textContent='▶ 播放';}}render();}}requestAnimationFrame(loop);}
document.getElementById('play').onclick=function(){playing=!playing;last=0;this.textContent=playing?'❚❚ 暫停':'▶ 播放';};
document.getElementById('prev').onclick=()=>{cur=(cur-1+SCENES.length)%SCENES.length;frame=0;render();};
document.getElementById('next').onclick=()=>{cur=(cur+1)%SCENES.length;frame=0;render();};
scrub.oninput=()=>{frame=+scrub.value;playing=false;document.getElementById('play').textContent='▶ 播放';render();};
window.onkeydown=(e)=>{if(e.key==='ArrowLeft')document.getElementById('prev').click();if(e.key==='ArrowRight')document.getElementById('next').click();if(e.key===' '){e.preventDefault();document.getElementById('play').click();}};

// 等字型載入後再畫（canvas CJK 需字型就緒）
document.fonts.load('900 100px "Noto Sans TC"').then(()=>document.fonts.load('500 36px "Noto Sans TC"')).then(()=>{render();requestAnimationFrame(loop);}).catch(()=>{render();requestAnimationFrame(loop);});
</script>
