<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Agent × Harness — Claude Design 深色版 · Canvas 逐幀預覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#34D3EE; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:#0a0c12; color:#eee; font-family:"Space Grotesk","Noto Sans TC",system-ui,sans-serif;}
  body{display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px;}
  h1{font-size:14px; font-weight:600; letter-spacing:2px; color:#aeb7c6; font-family:"JetBrains Mono",monospace;}
  h1 span{color:var(--accent);}
  #stage{position:relative; width:min(96vw, 1280px); aspect-ratio:16/9; background:#000; border-radius:10px; overflow:hidden; box-shadow:0 14px 60px rgba(0,0,0,.6);}
  canvas{width:100%; height:100%; display:block;}
  #scenelabel{position:absolute; top:12px; left:14px; font-size:12px; background:rgba(0,0,0,.5); padding:6px 12px; border-radius:20px; letter-spacing:1px; font-family:"JetBrains Mono",monospace; color:#cdd5e0;}
  .controls{display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; width:min(96vw,1280px);}
  button{font-family:inherit; font-size:14px; font-weight:600; color:#0a0c12; background:#cdd5e0; border:none; padding:9px 16px; border-radius:8px; cursor:pointer; transition:transform .15s, background .15s;}
  button:hover{transform:translateY(-2px); background:#fff;}
  button.accent{background:var(--accent); color:#06222a;}
  #scrub{flex:1; min-width:200px; accent-color:var(--accent); cursor:pointer;}
  #time{font-variant-numeric:tabular-nums; font-size:13px; min-width:96px; text-align:center; color:#8a93a3; font-family:"JetBrains Mono",monospace;}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; width:min(96vw,1280px);}
  .tab{font-size:11px; font-weight:500; padding:5px 10px; border-radius:6px; background:#1b1e2a; color:#aeb7c6; cursor:pointer; transition:.15s; font-family:"JetBrains Mono",monospace;}
  .tab:hover{background:#242938; color:#fff;}
  .tab.active{background:var(--accent); color:#06222a;}
  .hint{font-size:12px; color:#6e7888; font-family:"JetBrains Mono",monospace;}
</style>
</head>
<body>
  <h1>AI Agent × <span>Harness</span> ─ CLAUDE DESIGN 深色版 · Space Grotesk + JetBrains Mono + Noto Sans TC</h1>
  <div id="stage">
    <canvas id="cv" width="1920" height="1080"></canvas>
    <div id="scenelabel"></div>
  </div>
  <div class="controls">
    <button id="prev">◀ 上一頁</button>
    <button id="play" class="accent">▶ 播放</button>
    <button id="next">下一頁 ▶</button>
    <input id="scrub" type="range" min="0" max="100" value="0" />
    <span id="time">00 / 00f</span>
    <label class="hint"><input type="checkbox" id="loop" checked /> 單頁循環</label>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="hint">← → 切換頁面 · 空白鍵播放/暫停</div>

<script>
// ===== Claude Design 深色 token（由 style-presets.md Preset B 的 oklch 轉 hex）=====
const C = {
  bg0:'#13161F', bg1:'#1B1E2A', bg2:'#242A39', panel:'rgba(31,37,52,0.78)',
  fg:'#EAEEF5', fgDim:'#AEB7C6', fgMut:'#6E7888',
  line:'rgba(150,168,200,0.18)', line2:'rgba(120,140,180,0.12)',
  accent:'#34D3EE', accent2:'#4ADE9E', accent3:'#A78BFA', warn:'#F2C14E',
  glow:'rgba(52,211,238,0.55)'
};
const DISPLAY='"Space Grotesk","Noto Sans TC"';   // 拉丁用 Grotesk，中文 fallback 到 Noto
const MONO='"JetBrains Mono","Noto Sans TC"';
const TC='"Noto Sans TC"';
const W=1920, H=1080, FPS=30;
const cv=document.getElementById('cv'); const ctx=cv.getContext('2d');
const IMG={};  // 載入後的圖片素材

// ---------- 動畫工具 ----------
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const easeOut=x=>1-Math.pow(1-x,3);
const easeInOut=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
const ap=(f,delay=0,dur=16)=>easeOut(clamp((f-delay)/dur,0,1));
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function setFont(size,weight=600,fam=DISPLAY){ctx.font=`${weight} ${size}px ${fam}`;}
function wrapText(text,cx,cy,maxW,lh){
  const lines=[]; let line='';
  for(const ch of text){ if(ctx.measureText(line+ch).width>maxW && line){lines.push(line);line=ch;} else line+=ch; }
  if(line)lines.push(line);
  const start=cy-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,cx,start+i*lh));
}

// ---------- 背景 + Claude Design 母題（格線 / 暗角 / 角框 / 軌條）----------
function bg(eyebrow){
  ctx.fillStyle=C.bg0; ctx.fillRect(0,0,W,H);
  // 遮罩格線（80px）
  ctx.save();
  const mask=ctx.createRadialGradient(W*0.6,H*0.4,200,W*0.6,H*0.4,1200);
  mask.addColorStop(0,'rgba(255,255,255,1)'); mask.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=C.line2; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  // 暗角
  const g=ctx.createRadialGradient(W/2,H/2,500,W/2,H/2,1300);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 角框 + cyan 角
  ctx.strokeStyle=C.line; ctx.lineWidth=1.5; ctx.strokeRect(56,56,W-112,H-112);
  drawCorners(56,56,W-112,H-112);
  // 軌條
  rail(true,eyebrow||''); rail(false,'');
}
function drawCorners(x,y,w,h){
  ctx.strokeStyle=C.accent; ctx.lineWidth=2; const s=26;
  const seg=(cx,cy,dx,dy)=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+dx,cy);ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+dy);ctx.stroke();};
  seg(x,y,s,s); seg(x+w,y,-s,s); seg(x,y+h,s,-s); seg(x+w,y+h,-s,-s);
}
function rail(top,label){
  const y=top?96:H-96;
  ctx.save(); setFont(20,500,MONO); ctx.textBaseline='middle';
  ctx.textAlign='left'; ctx.fillStyle=C.fgMut;
  if(top){ // 發光點 + label
    ctx.fillStyle=C.accent; ctx.shadowColor=C.glow; ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(96,y,6,0,7);ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle=C.fgDim; ctx.fillText((label||'AI AGENT × HARNESS').toUpperCase(),120,y);
    ctx.textAlign='right'; ctx.fillStyle=C.fgMut; ctx.fillText('動畫解說 · 重製',W-96,y);
  } else {
    ctx.fillStyle=C.fgMut; ctx.fillText('CLAUDE DESIGN · DARK',96,y);
    ctx.textAlign='right'; ctx.fillText('1920×1080 · 30FPS',W-96,y);
  }
  ctx.restore();
}

// ---------- 元件 ----------
function box(x,y,w,h,o={}){
  const p=o.p??1; if(p<=0.001)return;
  ctx.save(); ctx.globalAlpha=clamp(p,0,1);
  ctx.translate(0,(1-easeOut(p))*22);
  // 面板
  ctx.fillStyle=o.fill??C.panel; rr(x,y,w,h,14); ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle=o.stroke??(o.hot?C.accent:C.line);
  if(o.hot){ctx.shadowColor=C.glow; ctx.shadowBlur=18;}
  rr(x,y,w,h,14); ctx.stroke(); ctx.shadowBlur=0;
  if(o.idx){setFont(18,500,MONO); ctx.fillStyle=C.fgMut; ctx.textAlign='right'; ctx.textBaseline='top'; ctx.fillText(o.idx,x+w-18,y+16);}
  if(o.label){ctx.fillStyle=o.color??C.fg; setFont(o.size??34,o.weight??600,o.fam??DISPLAY);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    wrapText(o.label,x+w/2,y+h/2,w-36,(o.size??34)*1.3);}
  ctx.restore();
}
function arrow(x1,y1,x2,y2,p=1,color){
  if(p<=0)return; color=color||C.accent;
  const cx=x1+(x2-x1)*easeOut(p), cy=y1+(y2-y1)*easeOut(p);
  ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(cx,cy);ctx.stroke();
  if(p>.95){const a=Math.atan2(y2-y1,x2-x1);ctx.translate(x2,y2);ctx.rotate(a);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-18,-9);ctx.lineTo(-18,9);ctx.closePath();ctx.fill();}
  ctx.restore();
}
function caption(text,p=1){
  if(p<=0||!text)return; ctx.save(); ctx.globalAlpha=clamp(p,0,1);
  setFont(34,500,TC); const tw=ctx.measureText(text).width;
  const pad=40, bw=tw+pad*2+24, bx=W/2-bw/2, by=H-188, bh=72;
  ctx.translate(0,(1-easeOut(p))*16);
  ctx.fillStyle='rgba(20,24,34,0.92)'; rr(bx,by,bw,bh,8); ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle=C.line; rr(bx,by,bw,bh,8); ctx.stroke();
  ctx.fillStyle=C.accent; ctx.shadowColor=C.glow; ctx.shadowBlur=14;
  ctx.beginPath();ctx.arc(bx+28,by+bh/2,6,0,7);ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle=C.fg; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(text,bx+50,by+bh/2);
  ctx.restore();
}
function capTrack(f,items){let cur=items[0];for(const it of items)if(f>=it.from)cur=it;caption(cur.text,ap(f-cur.from,0,10));}
function sectionTag(num,title,sub,f){
  const p=ap(f,2,16), p2=ap(f,8,16);
  ctx.save(); ctx.globalAlpha=p;
  // eyebrow mono
  setFont(22,500,MONO); ctx.fillStyle=C.accent; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('▶ '+(sub||''),120,180);
  ctx.restore();
  ctx.save(); ctx.globalAlpha=p2; ctx.translate((1-easeOut(p2))*-20,0);
  // 大數字
  setFont(92,700,DISPLAY); ctx.fillStyle=C.accent; ctx.textAlign='left'; ctx.fillText(num,120,290);
  // 標題
  setFont(60,700,DISPLAY); ctx.fillStyle=C.fg; ctx.fillText(title,240,278);
  ctx.restore();
}
function centerText(text,y,size,weight,color,p=1,ls=0,fam=DISPLAY){
  ctx.save(); ctx.globalAlpha=clamp(p,0,1); ctx.translate(0,(1-easeOut(p))*26);
  setFont(size,weight,fam); ctx.fillStyle=color; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(ls){const chars=[...text];let tot=0;chars.forEach(c=>tot+=ctx.measureText(c).width+ls);tot-=ls;
    let x=W/2-tot/2;chars.forEach(c=>{const w=ctx.measureText(c).width;ctx.fillText(c,x+w/2,y);x+=w+ls;});}
  else ctx.fillText(text,W/2,y);
  ctx.restore();
}
function pulse(x,y,r,f,color){color=color||C.accent;const t=(f%50)/50;ctx.save();ctx.globalAlpha=(1-t)*0.7;ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,y,r+t*40,0,7);ctx.stroke();ctx.restore();}
// 圖片素材：等比鋪滿框內（cover）並可加深色漸層 + 描邊
function imgFramed(key,x,y,w,h,p,o={}){
  const im=IMG[key]; if(!im||p<=0)return;
  ctx.save(); ctx.globalAlpha=clamp(p,0,1); ctx.translate(0,(1-easeOut(p))*18);
  rr(x,y,w,h,o.r??12); ctx.clip();
  const s=Math.max(w/im.width,h/im.height), iw=im.width*s, ih=im.height*s;
  ctx.drawImage(im,x+(w-iw)/2,y+(h-ih)/2,iw,ih);
  if(o.darken){const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'rgba(10,12,18,0.15)');g.addColorStop(1,'rgba(10,12,18,'+(o.darken)+')');ctx.fillStyle=g;ctx.fillRect(x,y,w,h);}
  ctx.restore();
  ctx.save(); ctx.globalAlpha=clamp(p,0,1); ctx.lineWidth=1.5; ctx.strokeStyle=o.hot?C.accent:C.line; rr(x,y,w,h,o.r??12); ctx.stroke();
  if(o.tag){setFont(16,500,MONO); ctx.fillStyle=C.accent; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(o.tag,x+14,y+12);}
  ctx.restore();
}
// 線條 icon（user / app地球 / ai大腦 / search / eye）
function glyph(t,cx,cy,s,c){ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';
  if(t==='user'){ctx.beginPath();ctx.arc(cx,cy-s*0.28,s*0.34,0,7);ctx.stroke();ctx.beginPath();ctx.arc(cx,cy+s*0.85,s*0.66,Math.PI*1.15,Math.PI*1.85);ctx.stroke();}
  else if(t==='app'){ctx.beginPath();ctx.arc(cx,cy,s*0.5,0,7);ctx.stroke();ctx.beginPath();ctx.ellipse(cx,cy,s*0.22,s*0.5,0,0,7);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-s*0.5,cy);ctx.lineTo(cx+s*0.5,cy);ctx.stroke();}
  else if(t==='ai'){const w=s*0.46;ctx.beginPath();ctx.arc(cx-w*0.55,cy,w,Math.PI*0.5,Math.PI*1.5);ctx.stroke();ctx.beginPath();ctx.arc(cx+w*0.55,cy,w,Math.PI*1.5,Math.PI*0.5);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy-w);ctx.lineTo(cx,cy+w);ctx.stroke();}
  else if(t==='search'){ctx.beginPath();ctx.arc(cx-s*0.12,cy-s*0.12,s*0.42,0,7);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+s*0.2,cy+s*0.2);ctx.lineTo(cx+s*0.52,cy+s*0.52);ctx.stroke();}
  else if(t==='eye'){ctx.beginPath();ctx.ellipse(cx,cy,s*0.55,s*0.33,0,0,7);ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,s*0.15,0,7);ctx.fill();}
  ctx.restore();}
// 節點卡（box + icon 在上、label 在下）
function node(x,y,w,h,p,o={}){ if(p<=0.001)return;
  box(x,y,w,h,{p,hot:o.hot,stroke:o.stroke,fill:o.fill});
  ctx.save();ctx.globalAlpha=clamp(p,0,1);ctx.translate(0,(1-easeOut(p))*22);
  const mx=x+w/2, col=o.iconColor||(o.hot?C.accent:(o.stroke||C.fgDim));
  if(o.icon)glyph(o.icon,mx,y+56,24,col);
  ctx.fillStyle=o.hot?C.accent:(o.stroke||C.fg);setFont(o.size??30,600,TC);ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(o.label,mx,y+h-46);
  ctx.restore();}
// 虛線連接（折線；p 控制淡入）
function dline(pts,p,color){ if(p<=0)return; ctx.save();ctx.globalAlpha=clamp(p,0,1);ctx.strokeStyle=color||C.line;ctx.lineWidth=2;ctx.setLineDash([7,9]);
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.restore();}
// 箭頭旁的小標籤
function alab(x,y,t,c,p){ if(p<=0)return; ctx.save();ctx.globalAlpha=clamp(p,0,1);setFont(19,500,TC);ctx.fillStyle=c||C.fgDim;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y);ctx.restore();}
// 沿折線跑的發光封包（phase 0..1）——把「連線」變「流動」
function flowDot(pts,phase,color){
  let segs=[],tot=0;
  for(let i=1;i<pts.length;i++){const l=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);segs.push(l);tot+=l;}
  let d=(phase%1)*tot,i=0; while(i<segs.length-1 && d>segs[i]){d-=segs[i];i++;}
  const t=segs[i]?clamp(d/segs[i],0,1):0;
  const x=pts[i][0]+(pts[i+1][0]-pts[i][0])*t, y=pts[i][1]+(pts[i+1][1]-pts[i][1])*t;
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=16;ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill();ctx.restore();
}
// 折線上 phase(0..1) 的座標
function pathPos(pts,phase){ let segs=[],tot=0; for(let i=1;i<pts.length;i++){const l=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);segs.push(l);tot+=l;}
  let d=clamp(phase,0,1)*tot,i=0; while(i<segs.length-1&&d>segs[i]){d-=segs[i];i++;} const t=segs[i]?clamp(d/segs[i],0,1):0;
  return {x:pts[i][0]+(pts[i+1][0]-pts[i][0])*t, y:pts[i][1]+(pts[i+1][1]-pts[i][1])*t}; }
// 會跑的標籤膠囊（框線＋文字，顯示傳的是什麼 payload）
function packetChip(x,y,text,color){ ctx.save(); setFont(20,600,TC); const tw=ctx.measureText(text).width, w=tw+34,h=40;
  ctx.shadowColor=color;ctx.shadowBlur=14;ctx.fillStyle='rgba(15,18,27,0.96)';rr(x-w/2,y-h/2,w,h,8);ctx.fill();ctx.shadowBlur=0;
  ctx.lineWidth=1.5;ctx.strokeStyle=color;rr(x-w/2,y-h/2,w,h,8);ctx.stroke();
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x,y);ctx.restore(); }
// 單次傳送：在 [a,b) 視窗內讓「標籤膠囊」沿 pts 跑一趟，並高亮該連線
function sendPacket(f,a,b,pts,color,label){ if(f<a||f>=b)return;
  ctx.save();ctx.globalAlpha=0.4;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([7,9]);
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.restore();
  const pos=pathPos(pts,easeInOut(clamp((f-a)/(b-a),0,1)));
  if(label) packetChip(pos.x,pos.y,label,color); else flowDot(pts,easeInOut(clamp((f-a)/(b-a),0,1)),color);
}

// ---------- 場景 ----------
const SCENES=[];
const S=(name,sec,draw)=>SCENES.push({name,dur:Math.round(sec*FPS),draw});

// 1 ── 封面
S('封面',16,(f)=>{ bg('EXPLAINER');
  // 掃描線
  const sy=((f*14)%(H+400))-200; ctx.save(); const sg=ctx.createLinearGradient(0,sy-120,0,sy+120);
  sg.addColorStop(0,'rgba(52,211,238,0)');sg.addColorStop(.5,'rgba(52,211,238,0.07)');sg.addColorStop(1,'rgba(52,211,238,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,sy-120,W,240); ctx.restore();
  // 置中混色文字；originY 不為 null 時，文字「從該 y 浮現」到自身 y（淡入＋位移）
  const coloredLine=(segs,y,size,weight,p,originY)=>{ if(p<=0)return;
    const eg=easeOut(clamp(p,0,1));
    ctx.save(); ctx.globalAlpha=clamp(p,0,1);
    ctx.translate(0,(originY!=null?(1-eg)*(originY-y):(1-eg)*26));
    setFont(size,weight,DISPLAY); ctx.textAlign='left'; ctx.textBaseline='middle';
    let tot=0; segs.forEach(s=>tot+=ctx.measureText(s.t).width);
    let x=W/2-tot/2;
    segs.forEach(s=>{ if(s.glow){ctx.shadowColor=C.glow;ctx.shadowBlur=18;}else ctx.shadowBlur=0;
      ctx.fillStyle=s.c; ctx.fillText(s.t,x,y); x+=ctx.measureText(s.t).width; });
    ctx.restore(); };
  // ① 中央 accent 線先出現（由中央往兩側展開 + 發光）——當作上下文字的原點
  const lineY=565;
  setFont(138,700,DISPLAY); const tw=ctx.measureText('AI Agent 怎麼運作').width;
  const lp=ap(f,6,18), w=lp*tw;
  ctx.save(); ctx.globalAlpha=clamp(lp,0,1); ctx.fillStyle=C.accent; ctx.shadowColor=C.glow; ctx.shadowBlur=16;
  ctx.fillRect(W/2-w/2,lineY,w,4); ctx.restore(); ctx.shadowBlur=0;
  // ② 主標：從線「由下往上」浮現（Agent 電光青）

function pitfall(f,num,title,sub,problem,fix,caps,imgKey,imgTag){ bg(sub); sectionTag(num,title,sub,f);
  ctx.save();ctx.globalAlpha=ap(f,10);setFont(26,600,MONO);ctx.fillStyle=C.warn;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('⚠ 坑',200,400);ctx.restore();
  if(imgKey){imgFramed(imgKey,200,430,520,200,ap(f,12),{tag:imgTag,darken:0.25});}
  else box(200,430,640,210,{p:ap(f,12),stroke:C.warn,label:problem,size:28,weight:500,fam:TC});
  arrow(imgKey?740:870,535,imgKey?1020:1060,535,ap(f-30,0,16),C.fgMut);
  ctx.save();ctx.globalAlpha=ap(f,34);setFont(26,600,MONO);ctx.fillStyle=C.accent2;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('✓ 對策',imgKey?1060:1080,400);ctx.restore();
  box(imgKey?1060:1080,430,imgKey?660:640,210,{p:ap(f,36),hot:true,label:fix,size:28,weight:500,fam:TC});
  if(imgKey&&problem){ctx.save();ctx.globalAlpha=ap(f,14);setFont(24,500,TC);ctx.fillStyle=C.fgDim;ctx.textAlign='left';ctx.textBaseline='top';wrapTextLeft(problem,200,660,520,32);ctx.restore();}
  capTrack(f,caps);
}
function wrapTextLeft(text,x,y,maxW,lh){const lines=[];let line='';for(const ch of text){if(ctx.measureText(line+ch).width>maxW&&line){lines.push(line);line=ch;}else line+=ch;}if(line)lines.push(line);lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lh));}

// ---------- 播放控制 ----------
let cur=0, frame=0, playing=false, last=0;
const tabs=document.getElementById('tabs');
SCENES.forEach((s,i)=>{const d=document.createElement('div');d.className='tab';d.textContent=(i+1)+'·'+s.name;d.onclick=()=>{cur=i;frame=0;render();updateUI();};tabs.appendChild(d);});
const scrub=document.getElementById('scrub'),timeEl=document.getElementById('time'),label=document.getElementById('scenelabel');
function updateUI(){const s=SCENES[cur];scrub.max=s.dur-1;scrub.value=frame;timeEl.textContent=String(frame).padStart(3,'0')+' / '+s.dur+'f';label.textContent=(cur+1)+'/'+SCENES.length+'  '+s.name;[...tabs.children].forEach((t,i)=>t.classList.toggle('active',i===cur));}
function render(){const s=SCENES[cur];ctx.clearRect(0,0,W,H);s.draw(frame);updateUI();}
function loop(ts){if(playing){if(!last)last=ts;const dt=ts-last;if(dt>=1000/FPS){frame++;last=ts;const s=SCENES[cur];if(frame>=s.dur){if(document.getElementById('loop').checked)frame=0;else if(cur<SCENES.length-1){cur++;frame=0;}else{playing=false;document.getElementById('play').textContent='▶ 播放';}}render();}}requestAnimationFrame(loop);}
document.getElementById('play').onclick=function(){playing=!playing;last=0;this.textContent=playing?'❚❚ 暫停':'▶ 播放';};
document.getElementById('prev').onclick=()=>{cur=(cur-1+SCENES.length)%SCENES.length;frame=0;render();};
document.getElementById('next').onclick=()=>{cur=(cur+1)%SCENES.length;frame=0;render();};
scrub.oninput=()=>{frame=+scrub.value;playing=false;document.getElementById('play').textContent='▶ 播放';render();};
window.onkeydown=(e)=>{if(e.key==='ArrowLeft')document.getElementById('prev').click();if(e.key==='ArrowRight')document.getElementById('next').click();if(e.key===' '){e.preventDefault();document.getElementById('play').click();}};

// ---------- 字型 + 圖片素材就緒後再畫 ----------
function loadImg(key,src){return new Promise(res=>{const i=new Image();i.onload=()=>{IMG[key]=i;res();};i.onerror=()=>res();i.src=src;});}
Promise.all([
  document.fonts.load('700 100px "Space Grotesk"'),
  document.fonts.load('500 36px "JetBrains Mono"'),
  document.fonts.load('700 60px "Noto Sans TC"'),
  document.fonts.load('500 34px "Noto Sans TC"'),
  loadImg('t02','assets/t_02.jpg'), loadImg('t13','assets/t_13.jpg'),
  loadImg('t17','assets/t_17.jpg'), loadImg('t19','assets/t_19.jpg'),
  loadImg('t21','assets/t_21.jpg'), loadImg('t22','assets/t_22.jpg'),
  loadImg('doctor','assets/doctor.jpg'),
]).then(()=>{render();requestAnimationFrame(loop);}).catch(()=>{render();requestAnimationFrame(loop);});
